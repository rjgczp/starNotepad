services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: starNotepad
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  gva-server:
    build: ./gin-vue-admin/server
    restart: always
    ports:
      - "8888:8888"
    depends_on:
      - mysql
    volumes:
      # 这里就是把服务器上的 config.yaml 挂载进容器的关键
      - ./gin-vue-admin/server/config.yaml:/app/config.yaml
  gva-web:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./gin-vue-admin/web/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf # 挂载配置文件
    depends_on:
      - gva-server

